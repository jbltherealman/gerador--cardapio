<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio Online</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-primary: #ff4757;
            --color-secondary: #2d3436;
            --color-bg: #f4f6f8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--color-bg); color: var(--color-secondary); padding-bottom: 50px; -webkit-font-smoothing: antialiased; }
        
        header { 
            background-color: var(--color-primary); 
            color: white; 
            padding: 50px 20px 60px; 
            text-align: center; 
            border-radius: 0 0 40px 40px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); 
            position: relative; 
        }
        .logo { width: 110px; height: 110px; border-radius: 50%; border: 4px solid white; object-fit: cover; margin-bottom: 15px; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .logo-placeholder { width: 110px; height: 110px; border-radius: 50%; border: 4px solid white; display: flex; align-items: center; justify-content: center; font-size: 3rem; margin: 0 auto 15px; background: rgba(255,255,255,0.2); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 5px; }
        
        .whatsapp-btn { 
            display: inline-flex; align-items: center; gap: 8px; 
            background: #25D366; color: white; padding: 12px 24px; 
            border-radius: 30px; text-decoration: none; font-weight: 600; 
            margin-top: 15px; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4); 
            transition: transform 0.2s;
        }
        .whatsapp-btn:active { transform: scale(0.95); }
        
        .container { max-width: 600px; margin: -30px auto 0; padding: 0 20px; position: relative; z-index: 10; }
        
        .category-title { font-size: 1.25rem; font-weight: 700; color: var(--color-secondary); margin: 30px 0 15px; display: flex; align-items: center; gap: 10px; }
        .category-title::before { content: ''; display: block; width: 5px; height: 22px; background-color: var(--color-primary); border-radius: 3px; }
        
        .item-card { 
            background: white; border-radius: 20px; padding: 15px; 
            display: flex; gap: 15px; margin-bottom: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.04); 
            transition: transform 0.2s, box-shadow 0.2s; 
        }
        .item-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.08); }
        .item-card:active { transform: scale(0.98); }
        
        .item-img { width: 90px; height: 90px; border-radius: 14px; object-fit: cover; background: #f1f2f6; flex-shrink: 0; }
        .item-info { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .item-name { font-size: 1.1rem; font-weight: 600; color: var(--color-secondary); margin-bottom: 4px; }
        .item-desc { font-size: 0.85rem; color: #636e72; margin-bottom: 8px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .item-price { font-size: 1.1rem; font-weight: 700; color: var(--color-primary); margin-top: auto; }
        
        /* Filtros e Busca */
        .filters-container { margin: 20px 0 30px; display: flex; flex-direction: column; gap: 15px; }
        .search-bar { width: 100%; padding: 14px 20px; border-radius: 20px; border: 1px solid #dfe6e9; font-size: 1rem; outline: none; transition: border-color 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .search-bar:focus { border-color: var(--color-primary); }
        .category-pills { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .category-pills::-webkit-scrollbar { display: none; }
        .pill { padding: 10px 20px; background: white; border: 1px solid #dfe6e9; border-radius: 20px; font-size: 0.95rem; font-weight: 600; cursor: pointer; white-space: nowrap; transition: all 0.2s; color: var(--color-secondary); box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .pill.active { background: var(--color-primary); color: white; border-color: var(--color-primary); }
        
        .empty-state { text-align: center; padding: 50px 20px; color: #a4b0be; background: white; border-radius: 20px; margin-top: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.04); }
        
        @media (min-width: 768px) {
            .container { max-width: 900px; margin-top: -40px; }
            .items-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
            .item-card { margin-bottom: 0; }
        }
    </style>
</head>
<body>
    <div id="menu-root"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const dataStr = localStorage.getItem('burgerMenuData');
            const data = dataStr ? JSON.parse(dataStr) : { restaurant: {}, items: [] };
            const root = document.getElementById('menu-root');
            
            const r = data.restaurant;
            const items = data.items || [];
            
            if (r.colorPrimary) document.documentElement.style.setProperty('--color-primary', r.colorPrimary);
            if (r.colorSecondary) document.documentElement.style.setProperty('--color-secondary', r.colorSecondary);
            
            document.title = r.name ? `Cardápio - ${r.name}` : 'Cardápio Online';

            const headerHtml = `
                <header>
                    ${r.logo ? `<img src="${r.logo}" class="logo" alt="Logo">` : `<div class="logo-placeholder">🍔</div>`}
                    <h1>${r.name || 'Nosso Cardápio'}</h1>
                    ${r.whatsapp ? `<a href="https://wa.me/55${r.whatsapp.replace(/\D/g,'')}?text=Olá! Gostaria de fazer um pedido pelo cardápio." class="whatsapp-btn" target="_blank">📲 Fazer Pedido</a>` : ''}
                </header>
            `;

            const bannerHtml = r.banner ? `
                <div style="margin: 20px auto 0; max-width: 900px; padding: 0 20px; position: relative; z-index: 10;">
                    <img src="${r.banner}" style="width: 100%; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); object-fit: cover;">
                </div>
            ` : '';

            root.innerHTML = `
                ${headerHtml}
                ${bannerHtml}
                <main class="container">
                    ${items.length > 0 ? `
                        <div class="filters-container">
                            <input type="text" id="search-input" placeholder="Buscar produto..." class="search-bar">
                            <div class="category-pills" id="category-pills"></div>
                        </div>
                        <div id="items-container"></div>
                    ` : `<div class="empty-state"><h3>Nenhum produto disponível no momento.</h3><p>Volte mais tarde!</p></div>`}
                </main>
            `;

            if (items.length === 0) return;

            const searchInput = document.getElementById('search-input');
            const categoryPills = document.getElementById('category-pills');
            const itemsContainer = document.getElementById('items-container');

            let currentCategory = 'Todos';
            let searchTerm = '';

            // Gerar categorias únicas
            const categories = ['Todos', ...new Set(items.map(i => i.category || 'Outros'))];
            categoryPills.innerHTML = categories.map(c => `<button class="pill ${c === 'Todos' ? 'active' : ''}" data-cat="${c}">${c}</button>`).join('');

            const renderFilteredItems = () => {
                let filtered = items;
                if(currentCategory !== 'Todos') {
                    filtered = filtered.filter(i => (i.category || 'Outros') === currentCategory);
                }
                if(searchTerm) {
                    const lower = searchTerm.toLowerCase();
                    filtered = filtered.filter(i => i.name.toLowerCase().includes(lower) || (i.desc && i.desc.toLowerCase().includes(lower)));
                }

                if(filtered.length === 0) {
                    itemsContainer.innerHTML = `<div class="empty-state" style="margin-top:0;"><h3>Nenhum produto encontrado.</h3><p>Tente buscar por outro termo.</p></div>`;
                    return;
                }

                const featuredItems = filtered.filter(i => i.featured);
                const regularItems = filtered.filter(i => !i.featured);

                const featuredHtml = featuredItems.length > 0 ? `
                    <div class="category-section" style="margin-bottom: 30px;">
                        <h2 class="category-title" style="color: var(--color-primary);">⭐ Destaques</h2>
                        <div style="display: flex; gap: 20px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: none;">
                            ${featuredItems.map(item => `
                                <div style="min-width: 200px; background: white; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden; border: 1px solid var(--color-primary); flex-shrink: 0; transition: transform 0.2s;">
                                    <img src="${item.img || 'https://via.placeholder.com/200'}" style="width: 100%; height: 140px; object-fit: cover;">
                                    <div style="padding: 15px;">
                                        <h3 style="font-size: 1.1rem; margin-bottom: 5px; color: var(--color-secondary);">${item.name}</h3>
                                        <span style="font-size: 1.1rem; font-weight: 700; color: var(--color-primary);">R$ ${parseFloat(item.price).toFixed(2)}</span>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                ` : '';

                const grouped = regularItems.reduce((acc, item) => {
                    const cat = item.category || 'Outros';
                    if(!acc[cat]) acc[cat] = [];
                    acc[cat].push(item);
                    return acc;
                }, {});

                const categoriesHtml = Object.keys(grouped).map(cat => `
                    <div class="category-section">
                        <h2 class="category-title">${cat}</h2>
                        <div class="items-grid">
                            ${grouped[cat].map(item => `
                                <div class="item-card">
                                    <img src="${item.img || 'https://via.placeholder.com/120'}" class="item-img" alt="${item.name}">
                                    <div class="item-info">
                                        <h3 class="item-name">${item.name}</h3>
                                        <p class="item-desc">${item.desc}</p>
                                        <span class="item-price">R$ ${parseFloat(item.price).toFixed(2)}</span>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `).join('');

                itemsContainer.innerHTML = featuredHtml + categoriesHtml;
            };

            // Eventos
            searchInput.addEventListener('input', (e) => {
                searchTerm = e.target.value;
                renderFilteredItems();
            });

            categoryPills.addEventListener('click', (e) => {
                if(e.target.classList.contains('pill')) {
                    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
                    e.target.classList.add('active');
                    currentCategory = e.target.dataset.cat;
                    renderFilteredItems();
                }
            });

            renderFilteredItems();
        });
    </script>
</body>
</html>
